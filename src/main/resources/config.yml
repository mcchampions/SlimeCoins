config-version: 1

database:
  type: SQLITE
  mysql:
    host: localhost
    port: 3306
    database: slimecoins
    username: root
    password: ""
    useSSL: false
  h2:
    file: plugins/SlimeCoins/data/slimecoins

economy:
  initial-balance: 0.0
  currency-symbol: "💰"
  currency-name-singular: "粘液币"
  currency-name-plural: "粘液币"
  top-page-size: 10
  minimum-payment: 0.01
  maximum-payment: 1000000.0

mining-rewards:
  enabled: true
  blocks:
    STONE:
      chance: 0.05
      min-amount: 0.05
      max-amount: 0.50
    DEEPSLATE:
      chance: 0.03
      min-amount: 0.03
      max-amount: 0.56

log:
  enabled: true
  max-return-rows: 50
